{{- if .Values.proxy.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cf-tunnel-gw-ctrl.proxyFullname" . }}
  labels:
    {{- include "cf-tunnel-gw-ctrl.proxyLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cf-tunnel-gw-ctrl.proxySelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.proxy.networkPolicy.egressRestricted }}
    - Egress
    {{- end }}
  ingress:
    # Lock the config-API port (8081, also serves /metrics) to the controller
    # (the config pusher) by default. The proxy port (8080) takes NO in-cluster
    # ingress — traffic arrives through the outbound tunnel. An empty
    # ingress.from defaults to the release namespace (where the controller
    # runs); set ingress.from to also admit your monitoring namespace for
    # Prometheus scraping (locking 8081 also restricts /metrics).
    - from:
        {{- if .Values.proxy.networkPolicy.ingress.from }}
        {{- toYaml .Values.proxy.networkPolicy.ingress.from | nindent 8 }}
        {{- else }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.proxy.configAPIPort }}
  {{- if .Values.proxy.networkPolicy.egressRestricted }}
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Cloudflare edge (tunnel transport)
    - to:
        {{- range .Values.networkPolicy.cloudflareIpRanges.ipv4 }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
        {{- range .Values.networkPolicy.cloudflareIpRanges.ipv6 }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 443
        - protocol: UDP
          port: 7844
    # Cluster services (backend routing)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
  {{- end }}
{{- end }}
