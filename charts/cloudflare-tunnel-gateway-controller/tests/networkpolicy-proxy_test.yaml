suite: test networkpolicy-proxy
templates:
  - networkpolicy-proxy.yaml
release:
  namespace: cf-system
tests:
  - it: should create the NetworkPolicy by default (secure-by-default)
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: NetworkPolicy

  - it: should not create the NetworkPolicy when explicitly disabled
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        networkPolicy:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should have the -proxy name and selector labels
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cloudflare-tunnel-gateway-controller-proxy
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/name"]
          value: cloudflare-tunnel-gateway-controller-proxy
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/component"]
          value: proxy

  - it: should be ingress-only by default (no egress restriction)
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - contains:
          path: spec.policyTypes
          content: Ingress
      - notContains:
          path: spec.policyTypes
          content: Egress
      - notExists:
          path: spec.egress

  - it: should admit ONLY the config-API port, never the proxy port
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - lengthEqual:
          path: spec.ingress[0].ports
          count: 1
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: 8081
      - notContains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: 8080

  - it: should default ingress.from to the release (controller) namespace
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - contains:
          path: spec.ingress[0].from
          content:
            namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: cf-system

  - it: should ADD ingress.from to the controller namespace, never replace it
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        networkPolicy:
          ingress:
            from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: monitoring
    asserts:
      # The extra peer is admitted...
      - contains:
          path: spec.ingress[0].from
          content:
            namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: monitoring
      # ...AND the controller namespace stays admitted, so a config push is
      # never locked out by setting ingress.from (the docs promise "also").
      - contains:
          path: spec.ingress[0].from
          content:
            namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: cf-system

  - it: should restrict egress (DNS, Cloudflare edge, cluster services) when egressRestricted is set
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        networkPolicy:
          egressRestricted: true
    asserts:
      - contains:
          path: spec.policyTypes
          content: Egress
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: UDP
            port: 53
      - contains:
          path: spec.egress[1].ports
          content:
            protocol: UDP
            port: 7844
      - contains:
          path: spec.egress[1].to
          content:
            ipBlock:
              cidr: "173.245.48.0/20"
      - contains:
          path: spec.egress[2].to
          content:
            namespaceSelector: {}
