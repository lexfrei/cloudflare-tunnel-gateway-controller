suite: test networkpolicy-proxy
templates:
  - networkpolicy-proxy.yaml
release:
  namespace: cf-system
tests:
  - it: should create the NetworkPolicy by default (secure-by-default)
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: NetworkPolicy

  - it: should not create the NetworkPolicy when explicitly disabled
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        networkPolicy:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should have the -proxy name and selector labels
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cloudflare-tunnel-gateway-controller-proxy
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/name"]
          value: cloudflare-tunnel-gateway-controller-proxy
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/component"]
          value: proxy

  - it: should be ingress-only by default (no egress restriction)
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - contains:
          path: spec.policyTypes
          content: Ingress
      - notContains:
          path: spec.policyTypes
          content: Egress
      - notExists:
          path: spec.egress

  - it: should admit ONLY the config-API port, never the proxy port
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - lengthEqual:
          path: spec.ingress[0].ports
          count: 1
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: 8081
      - notContains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: 8080

  # The admitted port MUST track proxy.configAPIPort. The kubelet health
  # probes (deployment-proxy) target the config-API port by name, so the port
  # the policy gates and the port the probes hit are one knob — a custom value
  # must flow to both or in-cluster probes/pushes hit a port the policy never
  # admits. (deployment-proxy_test.yaml pins the probe side of the same knob.)
  - it: should track a custom configAPIPort in the admitted port
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        configAPIPort: 9091
    asserts:
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: 9091

  - it: should default ingress.from to the release (controller) namespace
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - contains:
          path: spec.ingress[0].from
          content:
            namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: cf-system

  - it: should ADD ingress.from to the controller namespace, never replace it
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        networkPolicy:
          ingress:
            from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: monitoring
    asserts:
      # The extra peer is admitted...
      - contains:
          path: spec.ingress[0].from
          content:
            namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: monitoring
      # ...AND the controller namespace stays admitted, so a config push is
      # never locked out by setting ingress.from (the docs promise "also").
      - contains:
          path: spec.ingress[0].from
          content:
            namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: cf-system

  - it: should restrict egress (DNS, Cloudflare edge, cluster services) when egressRestricted is set
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        networkPolicy:
          egressRestricted: true
    asserts:
      - contains:
          path: spec.policyTypes
          content: Egress
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: UDP
            port: 53
      - contains:
          path: spec.egress[1].ports
          content:
            protocol: UDP
            port: 7844
      - contains:
          path: spec.egress[1].to
          content:
            ipBlock:
              cidr: "173.245.48.0/20"
      - contains:
          path: spec.egress[2].to
          content:
            namespaceSelector: {}

  # Guard the empty-to foot-gun: egressRestricted with empty cloudflareIpRanges
  # would render an edge rule with an empty `to:`, which NetworkPolicy reads as
  # allow-all on 443/7844 — silently the OPPOSITE of restriction. Fail loudly
  # instead.
  - it: should fail when egressRestricted is set but cloudflareIpRanges is empty
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        networkPolicy:
          egressRestricted: true
      networkPolicy:
        cloudflareIpRanges:
          ipv4: []
          ipv6: []
    asserts:
      - failedTemplate:
          errorPattern: "egressRestricted is true but networkPolicy.cloudflareIpRanges is empty"

  # The in-cluster listener proxy-port ingress rule is the NetworkPolicy half of
  # the Knative net-gateway-api integration (#511). Without it the status prober
  # (in the net-gateway-api namespace) is blocked from the data plane and the
  # KIngress stays Ready=Unknown. Default off; when on, the proxy port is
  # admitted from the configured namespaces plus the release namespace.
  - it: should not admit the proxy port when inClusterListener disabled (default)
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - lengthEqual:
          path: spec.ingress
          count: 1
      - notContains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: 8080

  - it: should admit the proxy port from release and configured namespaces when enabled
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        proxyPort: 8080
        inClusterListener:
          enabled: true
          networkPolicy:
            namespaces:
              - knative-serving
    asserts:
      - contains:
          path: spec.ingress
          content:
            from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: cf-system
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: knative-serving
            ports:
              - protocol: TCP
                port: 8080
