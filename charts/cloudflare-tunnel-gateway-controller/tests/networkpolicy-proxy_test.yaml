suite: test networkpolicy-proxy
templates:
  - networkpolicy-proxy.yaml
tests:
  - it: should not create NetworkPolicy when proxy is disabled
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create NetworkPolicy when proxy enabled but networkPolicy disabled
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        networkPolicy:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create NetworkPolicy when both proxy and networkPolicy enabled
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        networkPolicy:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: NetworkPolicy

  - it: should have correct name with -proxy suffix
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        networkPolicy:
          enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cloudflare-tunnel-gateway-controller-proxy

  - it: should have correct labels
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        networkPolicy:
          enabled: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: cloudflare-tunnel-gateway-controller-proxy
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: should select proxy pods with correct selector labels
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        networkPolicy:
          enabled: true
    asserts:
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/name"]
          value: cloudflare-tunnel-gateway-controller-proxy
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/component"]
          value: proxy

  - it: should have both Ingress and Egress policy types
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        networkPolicy:
          enabled: true
    asserts:
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress

  - it: should allow ingress on configAPIPort
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        configAPIPort: 8081
        networkPolicy:
          enabled: true
    asserts:
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: 8081

  - it: should allow ingress on proxyPort
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        proxyPort: 8080
        networkPolicy:
          enabled: true
    asserts:
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: 8080

  - it: should allow DNS egress UDP
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        networkPolicy:
          enabled: true
    asserts:
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: UDP
            port: 53

  - it: should allow DNS egress TCP
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        networkPolicy:
          enabled: true
    asserts:
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: TCP
            port: 53

  - it: should allow Cloudflare edge egress on port 443 TCP
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        networkPolicy:
          enabled: true
    asserts:
      - contains:
          path: spec.egress[1].ports
          content:
            protocol: TCP
            port: 443

  - it: should allow Cloudflare edge egress on port 7844 UDP
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        networkPolicy:
          enabled: true
    asserts:
      - contains:
          path: spec.egress[1].ports
          content:
            protocol: UDP
            port: 7844

  - it: should allow Cloudflare edge egress to specific IP ranges
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        networkPolicy:
          enabled: true
    asserts:
      - contains:
          path: spec.egress[1].to
          content:
            ipBlock:
              cidr: "173.245.48.0/20"
      - contains:
          path: spec.egress[1].to
          content:
            ipBlock:
              cidr: "104.16.0.0/13"
      - contains:
          path: spec.egress[1].to
          content:
            ipBlock:
              cidr: "172.64.0.0/13"
      - contains:
          path: spec.egress[1].to
          content:
            ipBlock:
              cidr: "2606:4700::/32"

  - it: should allow cluster services egress
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        networkPolicy:
          enabled: true
    asserts:
      - contains:
          path: spec.egress[2].to
          content:
            namespaceSelector: {}
      - contains:
          path: spec.egress[2].ports
          content:
            protocol: TCP

  - it: should not have ingress from selector by default
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        networkPolicy:
          enabled: true
    asserts:
      - notExists:
          path: spec.ingress[0].from

  - it: should allow ingress from specific namespace
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
        networkPolicy:
          enabled: true
          ingress:
            from:
              - namespaceSelector:
                  matchLabels:
                    name: monitoring
    asserts:
      - contains:
          path: spec.ingress[0].from
          content:
            namespaceSelector:
              matchLabels:
                name: monitoring
