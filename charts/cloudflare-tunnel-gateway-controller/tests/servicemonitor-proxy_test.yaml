suite: test servicemonitor-proxy
templates:
  - servicemonitor-proxy.yaml
tests:
  - it: should not create ServiceMonitor by default
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create ServiceMonitor when serviceMonitor explicitly disabled
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
      serviceMonitor:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # The scrape would be a guaranteed 404 without the exporter: the monitor
  # must follow the metrics toggle, not just its own.
  - it: should not create ServiceMonitor when proxy metrics are disabled
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        metrics:
          enabled: false
      serviceMonitor:
        enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should create ServiceMonitor when serviceMonitor enabled
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
      serviceMonitor:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - equal:
          path: apiVersion
          value: monitoring.coreos.com/v1

  - it: should have correct name with -proxy suffix
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
      serviceMonitor:
        enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cloudflare-tunnel-gateway-controller-proxy

  - it: should have standard labels
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
      serviceMonitor:
        enabled: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: cloudflare-tunnel-gateway-controller-proxy
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: should add custom labels when specified
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
      serviceMonitor:
        enabled: true
        labels:
          prometheus: kube-prometheus
          team: platform
    asserts:
      - equal:
          path: metadata.labels.prometheus
          value: kube-prometheus
      - equal:
          path: metadata.labels.team
          value: platform

  - it: should select proxy pods with correct selector labels
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
      serviceMonitor:
        enabled: true
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: cloudflare-tunnel-gateway-controller-proxy
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: proxy

  - it: should scrape config-api endpoint at /metrics
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
      serviceMonitor:
        enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].port
          value: config-api
      - equal:
          path: spec.endpoints[0].path
          value: /metrics

  - it: should not set interval by default
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
      serviceMonitor:
        enabled: true
    asserts:
      - isNull:
          path: spec.endpoints[0].interval

  - it: should set custom interval when specified
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
      serviceMonitor:
        enabled: true
        interval: "30s"
    asserts:
      - equal:
          path: spec.endpoints[0].interval
          value: "30s"
