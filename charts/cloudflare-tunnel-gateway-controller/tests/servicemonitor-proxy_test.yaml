suite: test servicemonitor-proxy
templates:
  - servicemonitor-proxy.yaml
tests:
  - it: should not create ServiceMonitor when proxy is disabled
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create ServiceMonitor when proxy enabled but serviceMonitor disabled
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
      serviceMonitor:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create ServiceMonitor when both proxy and serviceMonitor enabled
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
      serviceMonitor:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - equal:
          path: apiVersion
          value: monitoring.coreos.com/v1

  - it: should have correct name with -proxy suffix
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
      serviceMonitor:
        enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cloudflare-tunnel-gateway-controller-proxy

  - it: should have standard labels
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
      serviceMonitor:
        enabled: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: cloudflare-tunnel-gateway-controller-proxy
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: should add custom labels when specified
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
      serviceMonitor:
        enabled: true
        labels:
          prometheus: kube-prometheus
          team: platform
    asserts:
      - equal:
          path: metadata.labels.prometheus
          value: kube-prometheus
      - equal:
          path: metadata.labels.team
          value: platform

  - it: should select proxy pods with correct selector labels
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
      serviceMonitor:
        enabled: true
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: cloudflare-tunnel-gateway-controller-proxy
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: proxy

  - it: should scrape config-api endpoint
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
      serviceMonitor:
        enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].port
          value: config-api

  - it: should not set interval by default
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
      serviceMonitor:
        enabled: true
    asserts:
      - isNull:
          path: spec.endpoints[0].interval

  - it: should set custom interval when specified
    set:
      cloudflare:
        tunnelId: "test-tunnel-id"
        apiToken: "test-api-token"
      proxy:
        enabled: true
      serviceMonitor:
        enabled: true
        interval: "30s"
    asserts:
      - equal:
          path: spec.endpoints[0].interval
          value: "30s"
