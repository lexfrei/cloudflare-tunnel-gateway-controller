suite: test service
templates:
  - service.yaml
tests:
  - it: should create a service
    asserts:
      - template: service.yaml
        isKind:
          of: Service
      - template: service.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-cloudflare-tunnel-gateway-controller

  - it: should use ClusterIP type by default
    asserts:
      - template: service.yaml
        equal:
          path: spec.type
          value: ClusterIP

  - it: should expose metrics and health ports
    asserts:
      - template: service.yaml
        contains:
          path: spec.ports
          content:
            name: metrics
            port: 8080
            targetPort: metrics
            protocol: TCP
      - template: service.yaml
        contains:
          path: spec.ports
          content:
            name: health
            port: 8081
            targetPort: health
            protocol: TCP

  - it: should use custom ports when specified
    set:
      service:
        metricsPort: 9090
        healthPort: 9091
    asserts:
      - template: service.yaml
        contains:
          path: spec.ports
          content:
            name: metrics
            port: 9090
            targetPort: metrics
            protocol: TCP
      - template: service.yaml
        contains:
          path: spec.ports
          content:
            name: health
            port: 9091
            targetPort: health
            protocol: TCP

  - it: should have correct labels
    asserts:
      - template: service.yaml
        equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: cloudflare-tunnel-gateway-controller
      - template: service.yaml
        equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: should select correct pods
    asserts:
      - template: service.yaml
        equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: cloudflare-tunnel-gateway-controller
      - template: service.yaml
        equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: should use NodePort type when specified
    set:
      service:
        type: NodePort
    asserts:
      - template: service.yaml
        equal:
          path: spec.type
          value: NodePort

  - it: should use LoadBalancer type when specified
    set:
      service:
        type: LoadBalancer
    asserts:
      - template: service.yaml
        equal:
          path: spec.type
          value: LoadBalancer

  - it: should work with fullnameOverride
    set:
      fullnameOverride: "custom-service"
    asserts:
      - template: service.yaml
        equal:
          path: metadata.name
          value: custom-service

  - it: should work with nameOverride
    set:
      nameOverride: "short-name"
    asserts:
      - template: service.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-short-name

  - it: should not have annotations by default
    asserts:
      - template: service.yaml
        notExists:
          path: metadata.annotations

  - it: should add annotations when specified
    set:
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8080"
          prometheus.io/path: "/metrics"
    asserts:
      - template: service.yaml
        equal:
          path: metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - template: service.yaml
        equal:
          path: metadata.annotations["prometheus.io/port"]
          value: "8080"
      - template: service.yaml
        equal:
          path: metadata.annotations["prometheus.io/path"]
          value: "/metrics"
