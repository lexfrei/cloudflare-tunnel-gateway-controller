suite: test rbac
templates:
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
tests:
  - it: should create a service account
    asserts:
      - template: serviceaccount.yaml
        isKind:
          of: ServiceAccount
      - template: serviceaccount.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-cloudflare-tunnel-gateway-controller

  - it: should create a cluster role
    asserts:
      - template: clusterrole.yaml
        isKind:
          of: ClusterRole
      - template: clusterrole.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-cloudflare-tunnel-gateway-controller

  - it: should have read-only permissions for GatewayClasses and HTTPRoutes
    asserts:
      - template: clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups: ["gateway.networking.k8s.io"]
            resources: ["gatewayclasses"]
            verbs: ["get", "list", "watch"]
      - template: clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups: ["gateway.networking.k8s.io"]
            resources: ["httproutes"]
            verbs: ["get", "list", "watch"]

  - it: should have read-only permissions for GRPCRoutes and ReferenceGrants
    asserts:
      - template: clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups: ["gateway.networking.k8s.io"]
            resources: ["grpcroutes"]
            verbs: ["get", "list", "watch"]
      - template: clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups: ["gateway.networking.k8s.io"]
            resources: ["referencegrants"]
            verbs: ["get", "list", "watch"]

  - it: should have read-only permissions for BackendTLSPolicy
    asserts:
      - template: clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups: ["gateway.networking.k8s.io"]
            resources: ["backendtlspolicies"]
            verbs: ["get", "list", "watch"]
      # The strict `contains` above already pins the verb list — any addition
      # of a write verb to the BackendTLSPolicy rule mutates the structure and
      # makes the assertion fail. A separate `notContains` per write verb
      # would be cosmetic (helm-unittest matches the whole content object, so
      # a single-verb negative check can never trigger on a mixed-verb rule).

  - it: should have write permissions for Gateways (for finalizers)
    asserts:
      - template: clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups: ["gateway.networking.k8s.io"]
            resources: ["gateways"]
            verbs: ["get", "list", "watch", "update", "patch"]

  - it: should NOT have write permissions for HTTPRoutes specs
    asserts:
      - template: clusterrole.yaml
        notContains:
          path: rules
          content:
            apiGroups: ["gateway.networking.k8s.io"]
            resources: ["httproutes"]
            verbs: ["get", "list", "watch", "update", "patch"]

  - it: should have write permissions only for status subresources
    asserts:
      - template: clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups: ["gateway.networking.k8s.io"]
            resources: ["gatewayclasses/status", "gateways/status", "httproutes/status", "grpcroutes/status", "backendtlspolicies/status", "listenersets/status"]
            verbs: ["get", "update", "patch"]

  - it: should grant read-only access on ListenerSet spec
    asserts:
      - template: clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups: ["gateway.networking.k8s.io"]
            resources: ["listenersets"]
            verbs: ["get", "list", "watch"]
      - template: clusterrole.yaml
        notContains:
          path: rules
          content:
            apiGroups: ["gateway.networking.k8s.io"]
            resources: ["listenersets"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # The v3 controller only reads Secrets (Cloudflare credentials, TLS cert
  # refs, BackendTLSPolicy CA bundles). The chart must NOT grant the
  # write verbs that the v2 Helm SDK code path needed; if a future
  # refactor restores them without restoring the matching code, this
  # test fires.
  - it: should grant only read access to Secrets
    asserts:
      - template: clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["secrets"]
            verbs: ["get", "list", "watch"]
      - template: clusterrole.yaml
        notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["secrets"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # ConfigMaps: BackendTLSPolicy can reference a ConfigMap holding the CA
  # bundle. Read-only.
  - it: should grant only read access to ConfigMaps
    asserts:
      - template: clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["configmaps"]
            verbs: ["get", "list", "watch"]

  # v3 removed internal/helm/manager.go and every Helm-SDK call site.
  # The chart must NOT grant the cluster-wide Pod/Deployment/ReplicaSet/
  # ServiceAccount write verbs that path needed. These negative
  # assertions lock the v3 RBAC boundary against accidental
  # re-introduction.
  - it: should NOT grant cluster-wide write on Deployments
    asserts:
      - template: clusterrole.yaml
        notContains:
          path: rules
          content:
            apiGroups: ["apps"]
            resources: ["deployments", "replicasets"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - it: should NOT grant cluster-wide write on ServiceAccounts/ConfigMaps/Pods
    asserts:
      - template: clusterrole.yaml
        notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["serviceaccounts", "configmaps", "pods"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - it: should have permissions for GatewayClassConfig CRD
    asserts:
      - template: clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups: ["cf.k8s.lex.la"]
            resources: ["gatewayclassconfigs"]
            verbs: ["get", "list", "watch"]
      - template: clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups: ["cf.k8s.lex.la"]
            resources: ["gatewayclassconfigs/status"]
            verbs: ["get", "update", "patch"]

  - it: should grant event create/patch on both core and events.k8s.io groups
    asserts:
      # controller-runtime's GetEventRecorder writes to events.k8s.io/v1; the
      # legacy broadcaster it also starts writes core v1 events. Both groups must
      # be granted or the EventRecorder is denied at runtime.
      - template: clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["events"]
            verbs: ["create", "patch"]
      - template: clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups: ["events.k8s.io"]
            resources: ["events"]
            verbs: ["create", "patch"]

  - it: should create a cluster role binding
    asserts:
      - template: clusterrolebinding.yaml
        isKind:
          of: ClusterRoleBinding
      - template: clusterrolebinding.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-cloudflare-tunnel-gateway-controller
      - template: clusterrolebinding.yaml
        equal:
          path: roleRef.name
          value: RELEASE-NAME-cloudflare-tunnel-gateway-controller
      - template: clusterrolebinding.yaml
        contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: RELEASE-NAME-cloudflare-tunnel-gateway-controller
            namespace: NAMESPACE

  - it: should add service account annotations when specified
    set:
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/my-role"
    asserts:
      - template: serviceaccount.yaml
        equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789012:role/my-role"

  - it: should use custom service account name when specified
    set:
      serviceAccount:
        name: "my-custom-sa"
    asserts:
      - template: serviceaccount.yaml
        equal:
          path: metadata.name
          value: my-custom-sa
