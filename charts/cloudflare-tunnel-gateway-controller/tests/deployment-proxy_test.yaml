suite: test proxy deployment
templates:
  - deployment-proxy.yaml
tests:
  # Pin the v3 invariant: tunnelTokenSecretRef.name is mandatory.
  # The chart's `required` helper must fail install when the value is
  # empty (the default in values.yaml), otherwise the proxy would start
  # without a tunnel token and silently fail to dial Cloudflare edge.
  # A future refactor that turns the `required` into a soft default
  # would convert the breaking-change-by-design into a silent breakage;
  # this test fires before that lands.
  - it: should fail to render when proxy.tunnelTokenSecretRef.name is empty
    asserts:
      - failedTemplate:
          errorPattern: "proxy.tunnelTokenSecretRef.name is required"

  - it: should create proxy deployment with default values
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 2

  - it: should set custom replicas
    set:
      proxy:
        replicas: 3
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  # The pod's terminationGracePeriodSeconds must exceed the connector drain
  # window (PROXY_GRACE_PERIOD) so kubelet's SIGKILL never lands while
  # cloudflared is still draining in-flight requests. The chart derives both
  # from one knob: gracePeriodSeconds → env, +15s headroom → pod field.
  - it: should derive terminationGracePeriodSeconds and PROXY_GRACE_PERIOD from default gracePeriodSeconds
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 45
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_GRACE_PERIOD
            value: "30s"

  - it: should derive terminationGracePeriodSeconds and PROXY_GRACE_PERIOD from custom gracePeriodSeconds
    set:
      proxy:
        gracePeriodSeconds: 60
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 75
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_GRACE_PERIOD
            value: "60s"

  # An explicit null override removes the key from values; the template must
  # fall back to the default instead of computing a 0s drain + 15s TGPS.
  - it: should fall back to the default grace when gracePeriodSeconds is null
    set:
      proxy:
        gracePeriodSeconds: null
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 45
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_GRACE_PERIOD
            value: "30s"

  # Data-plane metrics are default-ON; the env var is rendered explicitly in
  # both states so the deployed intent is visible in the pod spec.
  - it: should enable proxy metrics by default
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_METRICS_ENABLED
            value: "true"

  - it: should disable proxy metrics when proxy.metrics.enabled is false
    set:
      proxy:
        metrics:
          enabled: false
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_METRICS_ENABLED
            value: "false"

  - it: should use correct proxy image
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr\\.io/lexfrei/cloudflare-tunnel-gateway-controller-proxy:"

  - it: should default to IfNotPresent pull policy
    # Stable-release default. The PR-chart build flips this to Always via a
    # workflow-side yq override so iteration picks up new pr-NNN-1d digests.
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: "IfNotPresent"

  - it: should set custom proxy pull policy
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        image:
          pullPolicy: "Always"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: "Always"

  - it: should mount tunnel token from secret
    set:
      proxy:
        tunnelTokenSecretRef:
          name: my-tunnel-secret
          key: my-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TUNNEL_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-tunnel-secret
                key: my-key

  - it: should use default tunnel token key
    set:
      proxy:
        tunnelTokenSecretRef:
          name: my-tunnel-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TUNNEL_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-tunnel-secret
                key: tunnel-token

  - it: should set config API and proxy ports
    set:
      proxy:
        configAPIPort: 9091
        proxyPort: 9090
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: config-api
            containerPort: 9091
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: proxy
            containerPort: 9090
            protocol: TCP

  - it: should apply security context defaults
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65534
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should set resource limits
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        resources:
          limits:
            cpu: 1
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 256Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 1
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi

  - it: should include proxy component label
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: proxy

  - it: should configure startup probe
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 30

  - it: should configure readiness probe
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz

  # All probes MUST target the config-API port (by name), never the proxy port
  # (8080, which takes no in-cluster ingress). The default-on config-API
  # NetworkPolicy gates exactly this port; the probe and the gate are one knob.
  # NOTE: kubelet probes originate from the node (host network), which a
  # namespaceSelector ingress rule does not match — most CNIs permit node->pod
  # health checks by default, but a strict CNI may need an explicit allow (see
  # the L7 proxy / NetworkPolicy docs). Pinning the named port keeps the risk
  # surface "kubelet from node" and prevents it silently becoming "all probes
  # blocked because they moved to an un-gated port".
  - it: should target the config-API port from every health probe
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.port
          value: config-api
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: config-api
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: config-api

  - it: should NOT emit any PROXY_ACCESS_LOG_* env when access log is disabled (default)
    # Zero-cost-when-disabled invariant: the binary side gates on
    # PROXY_ACCESS_LOG_ENABLED being truthy, so the env var being
    # absent is the desired default state. matchSnapshot on the
    # whole env block catches both shapes -- a regression emitting
    # PROXY_ACCESS_LOG_ENABLED=false (which the binary would treat
    # as disabled) AND a regression emitting it with value=true.
    # The original notContains-with-value form passed on both.
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].env[*].name
          pattern: "^PROXY_ACCESS_LOG_"

  - it: should emit PROXY_ACCESS_LOG_* env vars when access log enabled
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        accessLog:
          enabled: true
          samplingRate: 0.1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_ACCESS_LOG_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_ACCESS_LOG_SAMPLING_RATE
            value: "0.1"

  - it: should emit default samplingRate "1" when access log enabled without override
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        accessLog:
          enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_ACCESS_LOG_SAMPLING_RATE
            value: "1"

  - it: should NOT emit PROXY_ACCESS_LOG_STRIP_QUERY when stripQuery is false (default)
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        accessLog:
          enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: PROXY_ACCESS_LOG_STRIP_QUERY

  - it: should NOT emit PROXY_ACCESS_LOG_STRIP_QUERY when access log itself is disabled
    # The cmd/proxy binary already no-ops the strip option when access
    # logging is off, but the chart guards too so a stripQuery=true
    # left over from a previous values rev doesn't show up in the env
    # block when the operator turned access logging off.
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        accessLog:
          enabled: false
          stripQuery: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: PROXY_ACCESS_LOG_STRIP_QUERY

  - it: should emit PROXY_ACCESS_LOG_STRIP_QUERY=true when both enabled and stripQuery
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        accessLog:
          enabled: true
          stripQuery: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_ACCESS_LOG_STRIP_QUERY
            value: "true"

  - it: should set PROXY_TUNNEL_PROTOCOL when proxy.tunnel.protocol is http2
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        tunnel:
          protocol: http2
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_TUNNEL_PROTOCOL
            value: "http2"

  - it: should default PROXY_TUNNEL_PROTOCOL to auto
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_TUNNEL_PROTOCOL
            value: "auto"

  - it: should omit PROXY_TUNNEL_PROTOCOL when proxy.tunnel.protocol is empty
    # Empty string is a schema-valid value equivalent to "auto": the
    # {{- with }} guard omits the env var entirely, and the proxy treats an
    # unset PROXY_TUNNEL_PROTOCOL as auto. An operator may set it explicitly to
    # "" to mean "use the default transport".
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        tunnel:
          protocol: ""
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].env[*].name
          pattern: "^PROXY_TUNNEL_PROTOCOL$"

  - it: should NOT emit any PROXY_TRACING_* env when tracing is disabled (default)
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].env[*].name
          pattern: "^PROXY_TRACING_"

  - it: should emit PROXY_TRACING_* env vars when tracing enabled
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        tracing:
          enabled: true
          endpoint: "http://otel-collector.observability:4317"
          sampleRate: 0.5
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_TRACING_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_TRACING_ENDPOINT
            value: "http://otel-collector.observability:4317"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_TRACING_SAMPLE_RATE
            value: "0.5"

  - it: should emit default sampleRate "1" when tracing enabled without override
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        tracing:
          enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_TRACING_SAMPLE_RATE
            value: "1"

  - it: should NOT emit PROXY_TRACING_ENDPOINT when endpoint is empty
    set:
      proxy:
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        tracing:
          enabled: true
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].env[*].name
          pattern: "^PROXY_TRACING_ENDPOINT$"
