suite: test proxy deployment
templates:
  - deployment-proxy.yaml
tests:
  - it: should not create proxy deployment when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should create proxy deployment when enabled
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 2

  - it: should set custom replicas
    set:
      proxy:
        enabled: true
        replicas: 3
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should use correct proxy image
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr\\.io/lexfrei/cloudflare-tunnel-gateway-controller-proxy:"

  - it: should default to IfNotPresent pull policy
    # Stable-release default. The PR-chart build flips this to Always via a
    # workflow-side yq override so iteration picks up new pr-NNN-1d digests.
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: "IfNotPresent"

  - it: should set custom proxy pull policy
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        image:
          pullPolicy: "Always"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: "Always"

  - it: should mount tunnel token from secret
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: my-tunnel-secret
          key: my-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TUNNEL_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-tunnel-secret
                key: my-key

  - it: should use default tunnel token key
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: my-tunnel-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TUNNEL_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-tunnel-secret
                key: tunnel-token

  - it: should set config API and proxy ports
    set:
      proxy:
        enabled: true
        configAPIPort: 9091
        proxyPort: 9090
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: config-api
            containerPort: 9091
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: proxy
            containerPort: 9090
            protocol: TCP

  - it: should apply security context defaults
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65534
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should set resource limits
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        resources:
          limits:
            cpu: 1
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 256Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 1
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi

  - it: should include proxy component label
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: proxy

  - it: should configure startup probe
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 30

  - it: should configure readiness probe
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz

  - it: should NOT emit any PROXY_ACCESS_LOG_* env when access log is disabled (default)
    # Zero-cost-when-disabled invariant: the binary side gates on
    # PROXY_ACCESS_LOG_ENABLED being truthy, so the env var being
    # absent is the desired default state. matchSnapshot on the
    # whole env block catches both shapes -- a regression emitting
    # PROXY_ACCESS_LOG_ENABLED=false (which the binary would treat
    # as disabled) AND a regression emitting it with value=true.
    # The original notContains-with-value form passed on both.
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].env[*].name
          pattern: "^PROXY_ACCESS_LOG_"

  - it: should emit PROXY_ACCESS_LOG_* env vars when access log enabled
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        accessLog:
          enabled: true
          samplingRate: 0.1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_ACCESS_LOG_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_ACCESS_LOG_SAMPLING_RATE
            value: "0.1"

  - it: should emit default samplingRate "1" when access log enabled without override
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        accessLog:
          enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_ACCESS_LOG_SAMPLING_RATE
            value: "1"

  - it: should NOT emit PROXY_ACCESS_LOG_STRIP_QUERY when stripQuery is false (default)
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        accessLog:
          enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: PROXY_ACCESS_LOG_STRIP_QUERY

  - it: should NOT emit PROXY_ACCESS_LOG_STRIP_QUERY when access log itself is disabled
    # The cmd/proxy binary already no-ops the strip option when access
    # logging is off, but the chart guards too so a stripQuery=true
    # left over from a previous values rev doesn't show up in the env
    # block when the operator turned access logging off.
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        accessLog:
          enabled: false
          stripQuery: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: PROXY_ACCESS_LOG_STRIP_QUERY

  - it: should emit PROXY_ACCESS_LOG_STRIP_QUERY=true when both enabled and stripQuery
    set:
      proxy:
        enabled: true
        tunnelTokenSecretRef:
          name: tunnel-token-secret
        accessLog:
          enabled: true
          stripQuery: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROXY_ACCESS_LOG_STRIP_QUERY
            value: "true"
