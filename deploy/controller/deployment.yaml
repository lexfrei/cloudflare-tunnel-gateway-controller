apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-tunnel-gateway-controller
  namespace: cloudflare-tunnel-system
  labels:
    app.kubernetes.io/name: cloudflare-tunnel-gateway-controller
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflare-tunnel-gateway-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflare-tunnel-gateway-controller
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: cloudflare-tunnel-gateway-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: ghcr.io/lexfrei/cloudflare-tunnel-gateway-controller:latest
          args:
            - --controller-name=cf.k8s.lex.la/tunnel-controller
            # --proxy-endpoints points at the L7 proxy's headless Service.
            # Replace 'cloudflare-tunnel-system' with the namespace where the
            # proxy Deployment runs if different from the controller's.
            - --proxy-endpoints=http://cloudflare-tunnel-gateway-controller-proxy-headless.cloudflare-tunnel-system.svc.cluster.local:8081/config
            - --metrics-addr=:8080
            - --health-addr=:8081
            # cluster-domain is auto-detected from /etc/resolv.conf; uncomment
            # to override (e.g., custom cluster domain).
            # - --cluster-domain=cluster.local
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
# NOTE: Manual installation only ships the controller. The L7 proxy
# data plane (which terminates Cloudflare tunnel traffic in-process) is
# NOT included in this manifest. v3 requires the proxy to be running
# at the --proxy-endpoints URL above for any HTTPRoute to take effect.
# The Helm chart (charts/cloudflare-tunnel-gateway-controller) ships
# the proxy Deployment, Services, and config; for a working v3
# installation, use the chart. This manifest is preserved only for
# reference and for users with custom proxy deployment automation.
