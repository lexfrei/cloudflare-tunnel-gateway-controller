name: Labels

on:
  pull_request:
    paths:
      - .github/labels.yml
      - .github/workflows/labels.yaml
  push:
    branches: [master]
    paths:
      - .github/labels.yml
      - .github/workflows/labels.yaml
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 1'  # Mondays at 04:17 UTC

permissions:
  contents: read

concurrency:
  group: labels-sync
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install validator dependencies
        run: pip install --quiet --requirement scripts/requirements-labels.txt

      - name: Unit-test the validator
        run: python3 -m pytest scripts/validate_labels_test.py -v

      - name: Validate labels.yml schema
        run: python3 scripts/validate-labels.py

  sync:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: EndBug/label-sync@52074158190acb45f3077f9099fea818aa43f97a # v2.3.3
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
