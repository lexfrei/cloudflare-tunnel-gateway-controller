name: PR Privileged Actions

on:
  workflow_run:
    workflows: ["PR Checks and Build"]
    types: [completed]

permissions:
  pull-requests: write
  security-events: write
  actions: read

jobs:
  upload-sarif:
    name: Upload Security Results
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Download SARIF artifact
        id: download-sarif
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: trivy-sarif
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        if: steps.download-sarif.outcome == 'success'
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem
          ref: ${{ github.event.workflow_run.head_sha }}

  notify:
    name: Notify PR
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download PR metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pr-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read and validate PR number
        id: pr
        run: |
          PR_NUMBER=$(cat pr-number.txt)
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Invalid PR number: $PR_NUMBER"
            exit 1
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Check if first build
        id: first_build
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          result-encoding: string
          script: |
            const labels = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }}
            });

            const hasLabel = labels.data.some(label => label.name === 'Container Available');
            return hasLabel ? 'false' : 'true';

      - name: Add Container Available label
        if: steps.first_build.outputs.result == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              labels: ['Container Available']
            })

      - name: Comment on PR (first time only)
        if: steps.first_build.outputs.result == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};
            const ctrlTag = `ttl.sh/cf-tunnel-gateway-ctrl:pr-${prNumber}-1d`;
            const proxyTag = `ttl.sh/cf-tunnel-gateway-proxy:pr-${prNumber}-1d`;
            const chartVersion = `0.0.0-pr.${prNumber}-1d`;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Container images available\n\n**Controller (amd64 + arm64):**\n\`\`\`bash\npodman pull ${ctrlTag}\n\`\`\`\n\n**Proxy (amd64 + arm64):**\n\`\`\`bash\npodman pull ${proxyTag}\n\`\`\`\n\n## Helm chart available\n\n**Install chart:**\n\`\`\`bash\nhelm install test oci://ttl.sh/cloudflare-tunnel-gateway-controller --version ${chartVersion}\n\`\`\`\n\n> **Note:** Images and chart are rebuilt on every commit and expire after 24 hours (hosted on ttl.sh).`
            })
