name: Scripts

on:
  pull_request:
    paths:
      - scripts/reflow-paragraphs.py
      - scripts/reflow_paragraphs_test.py
      - scripts/requirements-reflow.txt
      - .github/scripts/pr-labels.js
      - .github/scripts/pr-labels.test.js
      - .github/scripts/check-404-redirect.test.js
      - docs/404.html
      - hack/check-doc-links.sh
      - hack/check-doc-links_test.sh
      # labels.yml is included so the drift-pin tests
      # (TYPE_TO_KIND/SCOPE_TO_AREA/SIZE_BUCKETS ↔ labels.yml) re-run
      # when labels.yml changes. Cost: the reflow job also fires on
      # labels.yml edits -- ~30s waste accepted to keep the pin live.
      - .github/labels.yml
      - .github/workflows/scripts.yaml
  push:
    branches: [master]
    paths:
      - scripts/reflow-paragraphs.py
      - scripts/reflow_paragraphs_test.py
      - scripts/requirements-reflow.txt
      - .github/scripts/pr-labels.js
      - .github/scripts/pr-labels.test.js
      - .github/scripts/check-404-redirect.test.js
      - docs/404.html
      - hack/check-doc-links.sh
      - hack/check-doc-links_test.sh
      # labels.yml is included so the drift-pin tests
      # (TYPE_TO_KIND/SCOPE_TO_AREA/SIZE_BUCKETS ↔ labels.yml) re-run
      # when labels.yml changes. Cost: the reflow job also fires on
      # labels.yml edits -- ~30s waste accepted to keep the pin live.
      - .github/labels.yml
      - .github/workflows/scripts.yaml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reflow:
    name: Reflow paragraphs test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14.6"

      - name: Install pytest
        run: pip install --quiet --requirement scripts/requirements-reflow.txt

      - name: Run reflow paragraphs tests
        # 16 pytest cases pin the list-item-continuation and nested-list
        # indent-preservation contracts. A regression to either would
        # silently produce mid-bullet wraps the next time someone runs
        # `python3 scripts/reflow-paragraphs.py docs/**.md`, violating the
        # project's prose-wrap rule. The script is fire-and-forget but the
        # suite guards future hand-edits.
        run: python3 -m pytest scripts/reflow_paragraphs_test.py -v

  pr-labels:
    name: PR-labels mapping test (from PR checkout)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Why this job exists separately from pr-labels.yaml's own
      # test-mapping step: pr-labels.yaml runs on pull_request_target,
      # which checks out the BASE branch (master) for security -- so a
      # PR that edits .github/scripts/pr-labels.js or its test file is
      # NOT exercised by the labeller's own gate. Running the suite
      # under `pull_request` here checks out the PR's branch and
      # therefore catches breakage in the mapping module itself.
      - name: Run pr-labels mapping tests
        run: node --test .github/scripts/pr-labels.test.js

  check-404-redirect:
    name: 404 redirect test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Pins the versionless-link redirect shipped inline in docs/404.html by
      # extracting and running the real script against stubbed window.location.
      - name: Run 404 redirect tests
        run: node --test .github/scripts/check-404-redirect.test.js

  check-doc-links:
    name: Doc-link guard test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Pins hack/check-doc-links.sh (the live gate runs in pr.yaml's lint job).
      - name: Run doc-link guard tests
        run: bash hack/check-doc-links_test.sh
