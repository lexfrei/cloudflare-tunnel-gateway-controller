# E2E test values for kind cluster
# Images are loaded locally via kind load

gatewayClassConfig:
  create: true
  tunnelID: "39fa1d08-6c1b-4c64-ae82-0467dc0a4c35"
  cloudflareCredentialsSecretRef:
    name: "cloudflare-credentials"
  tunnelTokenSecretRef:
    name: "cloudflare-tunnel-token"
  cloudflared:
    enabled: false

controller:
  gatewayClassName: "cloudflare-tunnel"
  controllerName: "cf.k8s.lex.la/tunnel-controller"
  logLevel: "debug"

image:
  repository: ttl.sh/v2-e2e-ctrl
  pullPolicy: Never
  tag: "1h"

proxy:
  enabled: true
  replicas: 1
  image:
    repository: ttl.sh/v2-e2e-proxy
    pullPolicy: Never
    tag: "1h"
  tunnelTokenSecretRef:
    name: "cloudflare-tunnel-token"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
