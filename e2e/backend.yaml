# Backend services for E2E testing
# Deploys two echo servers with different responses for traffic splitting tests
---
apiVersion: v1
kind: Namespace
metadata:
  name: e2e-test
---
# Backend A - returns "backend-a" in responses
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-a
  namespace: e2e-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-a
  template:
    metadata:
      labels:
        app: echo-a
    spec:
      containers:
        - name: echo
          image: docker.io/hashicorp/http-echo:latest
          args:
            - "-text=backend-a"
            - "-listen=:8080"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: echo-a
  namespace: e2e-test
spec:
  selector:
    app: echo-a
  ports:
    - port: 80
      targetPort: 8080
---
# Backend B - returns "backend-b" in responses
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-b
  namespace: e2e-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-b
  template:
    metadata:
      labels:
        app: echo-b
    spec:
      containers:
        - name: echo
          image: docker.io/hashicorp/http-echo:latest
          args:
            - "-text=backend-b"
            - "-listen=:8080"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: echo-b
  namespace: e2e-test
spec:
  selector:
    app: echo-b
  ports:
    - port: 80
      targetPort: 8080
